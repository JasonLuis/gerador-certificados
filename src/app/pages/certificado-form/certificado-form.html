<div class="d-flex flex-column align-items-center">
  <div class="content-titles">
    <h1 class="custom-title fw-bold">Certificados gerados</h1>
    <p class="custom-subtitle mb-4">Visualize todos os certificados gerados</p>
  </div>
  <div class="custom-card w-100">
    <h2 class="card-title">Novo certificado</h2>
    <div class="mb-3">
      <label for="" class="form-label">Nome</label>
      <input type="text" placeholder="Nome do aluno" class="form-control" />
    </div>
    <div class="mb-3 d-flex align-items-end">
      <div class="flex-grow-1 me-2">
        <label for="" class="form-label">Atividade</label>
        <input type="text" placeholder="Atividade exercida" class="form-control" />
      </div>
      <app-secondary-button></app-secondary-button>
    </div>
    <div class="atividade-group">
      <label for="" class="form-label">Lista de atividades</label>
      <div class="item-list w-100">
        <div class="item">
          <span class="item-text">Configuração com Angular CLI</span>
          <div class="remove-btn">
            <i class="ph ph-x"></i>
          </div>
        </div>
        <hr />
      </div>
    </div>

    <app-primary-button></app-primary-button>
  </div>
</div>
